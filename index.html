<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding-top: 100px;
            margin: 0;
            height: 100vh;
            color: white;

            background: linear-gradient(-45deg, #000000, #1a1a1a, #333333, #0f0f0f);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 { 
            font-size: 3.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>NotHinPorts</h1>
    <p>The Website built for X6525 [Infinix Smart 8]</p>
</body>
</html>
